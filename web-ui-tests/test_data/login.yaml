# Authentication test cases — shared across Playwright, Selenium, and Robot Framework
#
# Anchors used to reduce repetition:
#   &secret  — standard password
#   &std     — standard username
login:
  - id: TC-LOGIN-001
    title: "Valid credentials grant access to the product inventory"
    story: "Valid credentials"
    severity: BLOCKER
    tags: [smoke, happy-path]
    level: System
    username: &std standard_user
    password: &secret secret_sauce
    expected_title: Products
    # Happy path — smoke test

  - id: TC-LOGIN-002
    title: "Wrong password is rejected with a descriptive error"
    story: "Invalid credentials"
    severity: CRITICAL
    tags: [negative, validation]
    level: System
    username: *std
    password: wrong_password
    expected_error: "do not match"
    # Negative — wrong password

  - id: TC-LOGIN-003
    title: "Empty username triggers 'Username is required' error"
    story: "Input validation"
    severity: CRITICAL
    tags: [negative, validation, boundary]
    level: System
    username: ""
    password: *secret
    expected_error: "Username is required"
    # Boundary — empty username

  - id: TC-LOGIN-004
    title: "Empty password triggers 'Password is required' error"
    story: "Input validation"
    severity: CRITICAL
    tags: [negative, validation, boundary]
    level: System
    username: *std
    password: ""
    expected_error: "Password is required"
    # Boundary — empty password

  - id: TC-LOGIN-005
    title: "Locked-out user is denied access"
    story: "Access control"
    severity: CRITICAL
    tags: [negative, access-control]
    level: System
    username: locked_out_user
    password: *secret
    expected_error: "locked out"
    # Access control — locked account
