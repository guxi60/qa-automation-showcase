# Cart test cases ‚Ä?shared across Playwright, Selenium, and Robot Framework
cart:
  - id: TC-CART-001
    title: "Cart page displays all items added from inventory"
    story: "Cart display"
    severity: BLOCKER
    tags: [smoke]
    level: System
    req: REQ-CART-001
    add_items: &two_items
      - "Sauce Labs Backpack"
      - "Sauce Labs Onesie"
    # Display ‚Ä?added items appear in cart

  - id: TC-CART-002
    title: "Removing an item decrements count and removes from list"
    story: "Cart modification"
    severity: CRITICAL
    tags: [functional]
    level: System
    req: REQ-CART-002
    add_items: *two_items
    remove_item: "Sauce Labs Backpack"
    # Modification ‚Ä?remove from cart

  - id: TC-CART-003
    title: "Cart badge count survives navigation away and back"
    story: "Cart state persistence"
    severity: CRITICAL
    tags: [functional, state]
    level: System
    req: REQ-CART-003
    add_item: "Sauce Labs Backpack"
    # State ‚Ä?cart persists across navigation

  - id: TC-CART-004
    title: "Navigating to cart without adding items shows empty cart"
    story: "Empty cart"
    severity: CRITICAL
    tags: [functional]
    level: System
    req: REQ-CART-004
    # Empty state ‚Ä?cart starts empty

  - id: TC-CART-005
    title: "Checkout button is visible and enabled when cart has items"
    story: "Cart navigation"
    severity: CRITICAL
    tags: [functional, gui]
    level: System
    req: REQ-CART-005
    add_items: *two_items
    # GUI ‚Ä?checkout button visible
