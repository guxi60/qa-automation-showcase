# =============================================================================
# CI/CD — QA Automation Showcase
# =============================================================================
#
# Runs all five test suites and publishes Allure + Locust reports
# to GitHub Pages on push to main.
#
# Triggers:
#   push to main      — full run + report publish
#   pull_request      — only suites whose code changed, smoke-level
#   workflow_dispatch  — manual, with suite + level selectors
#
# Selective execution:
#   - Path-based: only suites whose source directories changed
#   - Workflow inputs: choose suite (all/api/playwright/...) + level (all/smoke)
#   - Smoke-first: PRs only run smoke-tagged tests for fast feedback
# =============================================================================

name: QA Automation CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/requirements/**'
      - 'docs/*.html'
      - '.github/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/requirements/**'
      - 'docs/*.html'
      - '.github/**'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite'
        type: choice
        options: [all, api, playwright, selenium, robot, performance]
        default: all
      level:
        description: 'Test level'
        type: choice
        options: [all, smoke]
        default: all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  Determine which suites + level to run
  # ═══════════════════════════════════════════════════════════════
  scope:
    name: 'Determine scope'
    runs-on: ubuntu-latest
    outputs:
      run-api: ${{ steps.resolve.outputs.api }}
      run-playwright: ${{ steps.resolve.outputs.playwright }}
      run-selenium: ${{ steps.resolve.outputs.selenium }}
      run-robot: ${{ steps.resolve.outputs.robot }}
      run-performance: ${{ steps.resolve.outputs.performance }}
      pytest-markers: ${{ steps.resolve.outputs.pytest-markers }}
      robot-include: ${{ steps.resolve.outputs.robot-include }}

    steps:
      - uses: actions/checkout@v4

      # ── Path-based detection (push / PR only) ─────────────────
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            api:
              - 'api-tests/**'
              - 'requirements.txt'
            playwright:
              - 'web-ui-tests/**'
              - 'requirements.txt'
            selenium:
              - 'selenium-tests/**'
              - 'requirements.txt'
            robot:
              - 'robot-tests/**'
              - 'requirements.txt'
            performance:
              - 'performance/**'

      # ── Resolve final scope ───────────────────────────────────
      - name: Resolve scope
        id: resolve
        run: |
          EVT="${{ github.event_name }}"
          SUITE="${{ github.event.inputs.suite }}"
          LEVEL="${{ github.event.inputs.level }}"

          # ── Suite selection ──────────────────────────────────
          if [ "$EVT" = "workflow_dispatch" ]; then
            # Manual: only the selected suite(s)
            case "$SUITE" in
              all)
                echo "api=true"           >> $GITHUB_OUTPUT
                echo "playwright=true"    >> $GITHUB_OUTPUT
                echo "selenium=true"      >> $GITHUB_OUTPUT
                echo "robot=true"         >> $GITHUB_OUTPUT
                echo "performance=true"   >> $GITHUB_OUTPUT
                ;;
              api)         echo "api=true"           >> $GITHUB_OUTPUT ;;
              playwright)  echo "playwright=true"    >> $GITHUB_OUTPUT ;;
              selenium)    echo "selenium=true"      >> $GITHUB_OUTPUT ;;
              robot)       echo "robot=true"         >> $GITHUB_OUTPUT ;;
              performance) echo "performance=true"   >> $GITHUB_OUTPUT ;;
            esac
          else
            # Push/PR: path-based (true if filter matches, false otherwise)
            echo "api=${{ steps.filter.outputs.api }}"                     >> $GITHUB_OUTPUT
            echo "playwright=${{ steps.filter.outputs.playwright }}"       >> $GITHUB_OUTPUT
            echo "selenium=${{ steps.filter.outputs.selenium }}"           >> $GITHUB_OUTPUT
            echo "robot=${{ steps.filter.outputs.robot }}"                 >> $GITHUB_OUTPUT
            echo "performance=${{ steps.filter.outputs.performance }}"     >> $GITHUB_OUTPUT
          fi

          # ── Level selection ──────────────────────────────────
          if [ "$EVT" = "pull_request" ] || [ "$LEVEL" = "smoke" ]; then
            echo "pytest-markers=-m smoke"      >> $GITHUB_OUTPUT
            echo "robot-include=--include smoke" >> $GITHUB_OUTPUT
            echo "::notice::🔹 SMOKE MODE — only smoke-tagged tests"
          else
            echo "pytest-markers="   >> $GITHUB_OUTPUT
            echo "robot-include="    >> $GITHUB_OUTPUT
            echo "::notice::🔹 FULL MODE — all tests"
          fi


  # ═══════════════════════════════════════════════════════════════
  #  API Tests
  # ═══════════════════════════════════════════════════════════════
  test-api:
    name: 'API (pytest+requests)'
    needs: scope
    if: needs.scope.outputs.run-api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run tests
        run: |
          cd api-tests
          rm -rf allure-results
          pytest -v ${{ needs.scope.outputs.pytest-markers }}
      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: api-tests/allure-results/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  #  Playwright Tests
  # ═══════════════════════════════════════════════════════════════
  test-playwright:
    name: 'Web UI (Playwright+pytest)'
    needs: scope
    if: needs.scope.outputs.run-playwright == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Run tests
        run: |
          cd web-ui-tests
          rm -rf allure-results
          pytest -v ${{ needs.scope.outputs.pytest-markers }}
      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-playwright
          path: web-ui-tests/allure-results/
          retention-days: 7
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-playwright
          path: web-ui-tests/screenshots/
          retention-days: 7
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  #  Selenium Tests
  # ═══════════════════════════════════════════════════════════════
  test-selenium:
    name: 'Web UI (Selenium+pytest)'
    needs: scope
    if: needs.scope.outputs.run-selenium == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Run tests
        run: |
          cd selenium-tests
          rm -rf allure-results
          pytest -v ${{ needs.scope.outputs.pytest-markers }}
      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-selenium
          path: selenium-tests/allure-results/
          retention-days: 7
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-selenium
          path: selenium-tests/screenshots/
          retention-days: 7
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  #  Robot Framework Tests
  # ═══════════════════════════════════════════════════════════════
  test-robot:
    name: 'Web UI (Robot Framework)'
    needs: scope
    if: needs.scope.outputs.run-robot == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps
      - name: Run tests
        run: |
          cd robot-tests
          rm -rf allure-results
          robot \
            --listener allure_robotframework:allure-results \
            --pythonpath resources \
            ${{ needs.scope.outputs.robot-include }} \
            tests/
      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-robot
          path: robot-tests/allure-results/
          retention-days: 7
      - name: Upload Robot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-logs
          path: |
            robot-tests/log.html
            robot-tests/report.html
            robot-tests/output.xml
          retention-days: 7
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════
  #  Performance Tests
  # ═══════════════════════════════════════════════════════════════
  test-performance:
    name: 'Performance (Locust)'
    needs: scope
    if: needs.scope.outputs.run-performance == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run Locust headless
        run: |
          cd performance
          locust -f locustfile.py --headless -u 10 -r 2 -t 60s --html report.html
      - name: Upload Locust HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: performance/report.html
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  #  Report Generation & GitHub Pages Publish
  # ═══════════════════════════════════════════════════════════════
  #
  #  Publishes on push to main OR manual dispatch on main.
  #  When only some suites run (manual/PR), only their reports
  #  are regenerated — other suites keep their existing reports.
  # ═══════════════════════════════════════════════════════════════
  publish-reports:
    name: 'Generate & Publish Reports'
    needs: [scope, test-api, test-playwright, test-selenium, test-robot, test-performance]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Allure CLI
        run: |
          ALLURE_VERSION=2.42.1
          curl -fsSLO "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.zip"
          sudo unzip -q "allure-${ALLURE_VERSION}.zip" -d /opt/
          rm "allure-${ALLURE_VERSION}.zip"
          sudo ln -sf /opt/allure-${ALLURE_VERSION}/bin/allure /usr/local/bin/allure
          allure --version

      - name: Download API allure-results
        uses: actions/download-artifact@v4
        if: needs.scope.outputs.run-api == 'true'
        with:
          name: allure-results-api
          path: _results/api

      - name: Generate API Allure report
        if: needs.scope.outputs.run-api == 'true'
        run: |
          allure generate _results/api -o docs/api --clean
          sed -i "s|<head>|<head><base href=\"/qa-automation-showcase/api/\">|" docs/api/index.html

      - name: Download Playwright allure-results
        uses: actions/download-artifact@v4
        if: needs.scope.outputs.run-playwright == 'true'
        with:
          name: allure-results-playwright
          path: _results/playwright

      - name: Generate Playwright Allure report
        if: needs.scope.outputs.run-playwright == 'true'
        run: |
          allure generate _results/playwright -o docs/playwright --clean
          sed -i "s|<head>|<head><base href=\"/qa-automation-showcase/playwright/\">|" docs/playwright/index.html

      - name: Download Selenium allure-results
        uses: actions/download-artifact@v4
        if: needs.scope.outputs.run-selenium == 'true'
        with:
          name: allure-results-selenium
          path: _results/selenium

      - name: Generate Selenium Allure report
        if: needs.scope.outputs.run-selenium == 'true'
        run: |
          allure generate _results/selenium -o docs/selenium --clean
          sed -i "s|<head>|<head><base href=\"/qa-automation-showcase/selenium/\">|" docs/selenium/index.html

      - name: Download Robot allure-results
        uses: actions/download-artifact@v4
        if: needs.scope.outputs.run-robot == 'true'
        with:
          name: allure-results-robot
          path: _results/robot

      - name: Generate Robot Allure report
        if: needs.scope.outputs.run-robot == 'true'
        run: |
          allure generate _results/robot -o docs/robot --clean
          sed -i "s|<head>|<head><base href=\"/qa-automation-showcase/robot/\">|" docs/robot/index.html

      - name: Download Locust HTML report
        uses: actions/download-artifact@v4
        if: needs.scope.outputs.run-performance == 'true'
        with:
          name: locust-report
          path: _results/perf

      - name: Publish Locust report
        if: needs.scope.outputs.run-performance == 'true'
        run: |
          mkdir -p docs/perf
          cp _results/perf/report.html docs/perf/index.html

      # ── Commit & push → triggers GitHub Pages rebuild ───────
      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only directories that were regenerated
          for d in api playwright selenium robot perf; do
            [ -d "docs/$d" ] && git add "docs/$d/"
          done

          if git diff --cached --quiet; then
            echo "No report changes. Skipping commit."
            exit 0
          fi

          git commit -m "ci: update Allure & Locust reports [skip ci]"
          git push origin main
