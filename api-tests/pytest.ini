[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --alluredir=allure-results
    -p no:warnings

markers =
    smoke: P0 critical-path API tests
    regression: full API regression suite
    schema: JSON Schema validation tests
    crud: Create / Read / Update / Delete tests
