# API test data — Users CRUD + Schema validation
#
# Each entry maps to exactly one pytest parametrized test case.
# Metadata keys (id, title, severity, tags, story, level) drive
# allure.dynamic.* via set_meta().  Domain keys (endpoint, method,
# expected_status, etc.) drive test assertions.

users:
  - id: TC-API-USERS-001
    title: "GET /users — list all users, verify count & structure"
    severity: CRITICAL
    tags: [smoke, regression, crud]
    story: "User CRUD"
    level: "API"
    endpoint: "/users"
    method: GET
    expected_status: 200
    assert_type: collection
    expected_count: 10
    content_type: "application/json"

  - id: TC-API-USERS-002
    title: "GET /users/1 — single user with JSON Schema validation"
    severity: CRITICAL
    tags: [smoke, regression, crud, schema]
    story: "User CRUD"
    level: "API"
    endpoint: "/users/1"
    method: GET
    expected_status: 200
    assert_type: single
    expected_id: 1
    schema: user_schema.json

  - id: TC-API-USERS-003
    title: "POST /users — create a new user"
    severity: CRITICAL
    tags: [smoke, regression, crud]
    story: "User CRUD"
    level: "API"
    endpoint: "/users"
    method: POST
    expected_status: 201
    assert_type: create
    payload:
      name: "Gu Xiang"
      username: "guxi60"
      email: "guxi60@example.com"
      address:
        street: "QA Lane"
        suite: "Suite 42"
        city: "Shanghai"
        zipcode: "200000"
        geo: {lat: "31.2304", lng: "121.4737"}
      phone: "+86-21-1234-5678"
      website: "github.com/guxi60"
      company:
        name: "QA Automation Inc."
        catchPhrase: "Quality at speed"
        bs: "automate everything"

  - id: TC-API-USERS-004
    title: "PUT /users/1 — full update of an existing user"
    severity: NORMAL
    tags: [regression, crud]
    story: "User CRUD"
    level: "API"
    endpoint: "/users/1"
    method: PUT
    expected_status: 200
    assert_type: update
    payload:
      id: 1
      name: "Updated Name"
      username: "updated_user"
      email: "updated@example.com"
      address:
        street: "New Street"
        suite: "Apt. 1"
        city: "Beijing"
        zipcode: "100000"
        geo: {lat: "39.9042", lng: "116.4074"}
      phone: "+86-10-0000-0000"
      website: "updated.example.com"
      company:
        name: "Updated Corp."
        catchPhrase: "Better every day"
        bs: "continuous delivery"

  - id: TC-API-USERS-005
    title: "DELETE /users/1 — remove a user"
    severity: NORMAL
    tags: [regression, crud]
    story: "User CRUD"
    level: "API"
    endpoint: "/users/1"
    method: DELETE
    expected_status: 200
    assert_type: delete

  - id: TC-API-USERS-006
    title: "GET /users/999 — 404 for non-existent user (negative)"
    severity: MINOR
    tags: [regression, crud]
    story: "User CRUD"
    level: "API"
    endpoint: "/users/999"
    method: GET
    expected_status: 404
    assert_type: negative

  - id: TC-API-USERS-007
    title: "Validate all /users against User JSON Schema"
    severity: CRITICAL
    tags: [regression, schema]
    story: "Schema Validation"
    level: "API"
    endpoint: "/users"
    method: GET
    expected_status: 200
    assert_type: schema_batch
    schema: user_schema.json
